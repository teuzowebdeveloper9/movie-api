version: "2"

run:
  # inclui os testes de integração (testcontainers) na análise
  build-tags:
    - integration

linters:
  default: standard
  enable:
    - misspell
    - gocritic
  exclusions:
    paths:
      - gen
      - api/openapi

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - gen
      - api/openapi
