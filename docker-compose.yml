name: movie-api

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-movies}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-movies}
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend

  movies:
    build:
      context: .
      dockerfile: docker/movies.Dockerfile
    image: movie-api/movies:local
    restart: unless-stopped
    environment:
      GRPC_PORT: "50051"
      DB_DRIVER: mongo
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DATABASE: movies
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-movies}:${RABBITMQ_PASS:-movies}@rabbitmq:5672/
      ASYNC_WRITES: "true"
      SEED_ENABLED: "true"
      LOG_LEVEL: info
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/movies", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
      # o seed dos ~28k filmes roda antes do gRPC subir; a janela maior cobre
      # o primeiro boot com banco vazio (especialmente no DynamoDB/LocalStack)
      start_period: 120s
    networks:
      - backend

  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    image: movie-api/gateway:local
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      HTTP_PORT: "8080"
      MOVIES_GRPC_ADDR: movies:50051
      APP_ENV: ${APP_ENV:-development}
      RATE_LIMIT_RPM: "300"
      REQUEST_TIMEOUT: 15s
      LOG_LEVEL: info
    depends_on:
      movies:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/gateway", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - backend

  mongo-express:
    image: mongo-express:1.0.2-20-alpine3.19
    restart: unless-stopped
    profiles:
      - tools
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_BASICAUTH: "true"
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASS:-admin}
      PORT: "8081"
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - backend

volumes:
  mongo-data:

networks:
  backend:
