apiVersion: v1
kind: ConfigMap
metadata:
  name: movies-config
data:
  GRPC_PORT: "50051"
  DB_DRIVER: mongo
  # MONGO_URI carrega credenciais e vem do Secret mongodb-credentials
  MONGO_DATABASE: movies
  ASYNC_WRITES: "true"
  SEED_ENABLED: "true"
  LOG_LEVEL: info
---
apiVersion: v1
kind: Service
metadata:
  name: movies
  labels:
    app: movies
spec:
  selector:
    app: movies
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: movies
  labels:
    app: movies
spec:
  replicas: 2
  selector:
    matchLabels:
      app: movies
  template:
    metadata:
      labels:
        app: movies
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: movies
          image: ghcr.io/teuzowebdeveloper9/movie-api/movies:latest
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 50051
          envFrom:
            - configMapRef:
                name: movies-config
          env:
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: url
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: uri
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: movies
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: movies
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
