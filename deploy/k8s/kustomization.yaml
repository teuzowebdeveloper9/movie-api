apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: movie-api
resources:
  - namespace.yaml
  - mongodb.yaml
  - rabbitmq.yaml
  - movies.yaml
  - gateway.yaml

# Credenciais ficam fora do git: os arquivos .env abaixo são gerados
# localmente com `make k8s-secrets` (ver secrets/*.env.example). O sufixo de
# hash nos nomes dos Secrets força rolling update quando a credencial muda.
secretGenerator:
  - name: rabbitmq-credentials
    envs:
      - secrets/rabbitmq.env
  - name: mongodb-credentials
    envs:
      - secrets/mongodb.env
